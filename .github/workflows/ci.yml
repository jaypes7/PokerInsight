name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
            infra:
              - 'infra/**'

  lint-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r apps/api/requirements-dev.txt
      - run: cd apps/api && ruff format --check . && ruff check . && mypy --strict app

  test-api-unit:
    needs: [changes, lint-api]
    if: needs.changes.outputs.api == 'true' && needs.lint-api.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r apps/api/requirements-dev.txt
      - run: cd apps/api && pytest tests/unit -q --cov=app --cov-report=xml --cov-fail-under=70

  test-api-integration:
    needs: [changes, lint-api]
    if: needs.changes.outputs.api == 'true' && needs.lint-api.result == 'success'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-bookworm
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r apps/api/requirements-dev.txt
      - run: cd apps/api && alembic upgrade head
        env:
          APP_ENV: ci
          DATABASE_URL: postgresql+asyncpg://postgres:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379/0
      - run: cd apps/api && pytest tests/integration -q
        env:
          APP_ENV: ci
          DATABASE_URL: postgresql+asyncpg://postgres:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379/0

  audit-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pip-audit
      - run: pip-audit -r apps/api/requirements.txt

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pokerinsight/web lint
      - run: pnpm --filter @pokerinsight/web typecheck
      - run: pnpm --filter @pokerinsight/web format:check

  test-web:
    needs: [changes, lint-web]
    if: needs.changes.outputs.web == 'true' && needs.lint-web.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pokerinsight/web test:coverage

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
